<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cruise Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B1F3A;
    --midnight: #152D4E;
    --gold: #F5C842;
    --gold-dim: #c9a330;
    --seafoam: #4FC3C3;
    --foam: #F0F8FF;
    --white: #ffffff;
    --mist: rgba(240, 248, 255, 0.08);
  }

  html, body {
    height: 100%;
    font-family: 'Montserrat', sans-serif;
    background: var(--navy);
    color: var(--foam);
    overflow-x: hidden;
  }

  /* ── STARS ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  /* ── MAIN LAYOUT ── */
  .scene {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 200px;
    z-index: 1;
  }

  /* ── HEADER ── */
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--seafoam);
    margin-bottom: 12px;
    font-weight: 600;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    text-align: center;
    color: var(--white);
    text-shadow: 0 0 60px rgba(79, 195, 195, 0.3);
    margin-bottom: 6px;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .subhead {
    font-size: clamp(0.8rem, 2vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(240,248,255,0.55);
    margin-bottom: 56px;
    text-align: center;
  }

  /* ── PORTHOLES ── */
  .countdown {
    display: flex;
    gap: clamp(12px, 3vw, 32px);
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 48px;
  }

  .porthole-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .porthole {
    position: relative;
    width: clamp(80px, 18vw, 140px);
    height: clamp(80px, 18vw, 140px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1e3d6b, #0a1826);
    border: 3px solid #2a5080;
    box-shadow:
      0 0 0 6px #1a3355,
      0 0 0 9px #0d2240,
      0 0 30px rgba(79,195,195,0.12),
      inset 0 2px 8px rgba(255,255,255,0.05),
      inset 0 -2px 8px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* bolts */
  .porthole::before {
    content: '';
    position: absolute; inset: -14px;
    border-radius: 50%;
    background: transparent;
    border: 3px dashed rgba(79, 195, 195, 0.15);
  }

  .porthole-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(245, 200, 66, 0.5);
    line-height: 1;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    position: relative; z-index: 1;
  }

  .porthole-number.flip {
    transform: scale(1.25);
    opacity: 0.5;
  }

  .porthole-label {
    font-size: clamp(0.6rem, 1.5vw, 0.72rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
    color: rgba(240,248,255,0.4);
  }

  /* separator dots */
  .sep {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 3rem);
    color: var(--gold-dim);
    opacity: 0.4;
    line-height: 1;
    padding-top: clamp(28px, 5vw, 46px);
  }

  /* ── DATE BADGE ── */
  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--mist);
    border: 1px solid rgba(79,195,195,0.2);
    border-radius: 100px;
    padding: 10px 24px;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    color: rgba(240,248,255,0.65);
    margin-bottom: 24px;
  }
  .date-badge .anchor {
    font-size: 14px;
  }
  .date-badge strong {
    color: var(--seafoam);
    font-weight: 600;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    width: min(420px, 90vw);
    margin-bottom: 8px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(240,248,255,0.3);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--seafoam), var(--gold));
    border-radius: 2px;
    transition: width 1s ease;
    box-shadow: 0 0 8px rgba(245,200,66,0.4);
  }
  .progress-pct {
    text-align: center;
    font-size: 0.68rem;
    color: rgba(240,248,255,0.25);
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  /* ── OCEAN & SHIP ── */
  .ocean-scene {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 180px;
    pointer-events: none;
    z-index: 2;
  }

  /* waves */
  .wave-layer {
    position: absolute;
    bottom: 0; left: 0;
    width: 200%;
    height: 100%;
  }
  .wave-layer svg { width: 100%; height: 100%; }

  .wave-back {
    animation: waveScroll 14s linear infinite;
    opacity: 0.4;
  }
  .wave-mid {
    animation: waveScroll 10s linear infinite reverse;
    opacity: 0.6;
  }
  .wave-front {
    animation: waveScroll 7s linear infinite;
    opacity: 1;
  }

  @keyframes waveScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ship */
  .ship-wrap {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    animation: shipBob 4s ease-in-out infinite;
    z-index: 3;
  }
  @keyframes shipBob {
    0%, 100% { transform: translateX(-50%) translateY(0) rotate(-0.5deg); }
    50%       { transform: translateX(-50%) translateY(-8px) rotate(0.5deg); }
  }

  .ship-svg {
    width: clamp(160px, 25vw, 280px);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
  }

  /* smoke */
  .smoke {
    position: absolute;
    bottom: 100%;
    animation: smokeRise var(--sd) ease-out infinite;
    opacity: 0;
    border-radius: 50%;
    background: rgba(200,220,240,0.18);
  }
  @keyframes smokeRise {
    0%   { opacity: 0; transform: translateY(0) scale(0.4); }
    20%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-50px) scale(1.8); }
  }

  /* moon / compass */
  .moon {
    position: fixed;
    top: 48px; right: 6vw;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #fffbe6, #f5c842);
    box-shadow: 0 0 40px rgba(245,200,66,0.35), 0 0 80px rgba(245,200,66,0.1);
    z-index: 1;
    animation: moonGlow 6s ease-in-out infinite alternate;
  }
  @keyframes moonGlow {
    from { box-shadow: 0 0 30px rgba(245,200,66,0.3), 0 0 60px rgba(245,200,66,0.08); }
    to   { box-shadow: 0 0 55px rgba(245,200,66,0.5), 0 0 100px rgba(245,200,66,0.15); }
  }

  /* ── ARRIVED STATE ── */
  .arrived {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 40px rgba(245,200,66,0.4);
    animation: pulse 2s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 0.8; }
    to   { opacity: 1; }
  }

  /* ── MOTION PERMISSION BUTTON (iOS) ── */
  #motion-btn {
    position: fixed;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: none; /* shown by JS when needed */
    align-items: center;
    gap: 8px;
    background: rgba(11,31,58,0.85);
    border: 1px solid rgba(79,195,195,0.4);
    color: var(--seafoam);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 20px rgba(79,195,195,0.15);
    animation: btnPulse 2s ease-in-out infinite alternate;
  }
  @keyframes btnPulse {
    from { box-shadow: 0 0 12px rgba(79,195,195,0.15); }
    to   { box-shadow: 0 0 28px rgba(79,195,195,0.35); }
  }

  /* when gyro is active, pause the CSS bob so JS controls it */
  .gyro-active .ship-wrap { animation: none !important; }
  .gyro-active .wave-back  { animation-play-state: running; }
  .gyro-active .wave-mid   { animation-play-state: running; }
  .gyro-active .wave-front { animation-play-state: running; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<button id="motion-btn">🌊 Enable Motion</button>
<div class="moon"></div>

<div class="scene">
  <p class="eyebrow">⚓ All Hands on Deck</p>
  <h1>Set Sail for<br><em>Adventure</em></h1>
  <p class="subhead">Embarkation · October 10, 2026 · 10:00 AM</p>

  <div id="countdown-wrap">
    <div class="countdown" id="countdown">
      <div class="porthole-wrap">
        <div class="porthole"><span class="porthole-number" id="days">--</span></div>
        <span class="porthole-label">Days</span>
      </div>
      <div class="sep">:</div>
      <div class="porthole-wrap">
        <div class="porthole"><span class="porthole-number" id="hours">--</span></div>
        <span class="porthole-label">Hours</span>
      </div>
      <div class="sep">:</div>
      <div class="porthole-wrap">
        <div class="porthole"><span class="porthole-number" id="minutes">--</span></div>
        <span class="porthole-label">Minutes</span>
      </div>
      <div class="sep">:</div>
      <div class="porthole-wrap">
        <div class="porthole"><span class="porthole-number" id="seconds">--</span></div>
        <span class="porthole-label">Seconds</span>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div class="date-badge">
        <span class="anchor">⚓</span>
        Departing <strong id="departure-label">October 10, 2026</strong> at <strong>10:00 AM</strong>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Journey begins</span>
          <span>Bon Voyage!</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-pct" id="progress-pct"></div>
      </div>
    </div>
  </div>
</div>

<!-- Ocean scene -->
<div class="ocean-scene">
  <!-- Back wave -->
  <div class="wave-layer wave-back">
    <svg viewBox="0 0 1440 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#0d2b50" d="M0,80 C180,40 360,120 540,80 C720,40 900,120 1080,80 C1260,40 1350,100 1440,80 L1440,180 L0,180 Z"/>
      <path fill="#0d2b50" d="M1440,80 C1260,40 1080,120 900,80 C720,40 540,120 360,80 C180,40 90,100 0,80 L0,180 L1440,180 Z"/>
    </svg>
  </div>
  <!-- Mid wave -->
  <div class="wave-layer wave-mid">
    <svg viewBox="0 0 1440 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#113564" d="M0,100 C200,60 400,140 600,100 C800,60 1000,140 1200,100 C1320,76 1380,116 1440,100 L1440,180 L0,180 Z"/>
      <path fill="#113564" d="M1440,100 C1240,60 1040,140 840,100 C640,60 440,140 240,100 C120,76 60,116 0,100 L0,180 L1440,180 Z"/>
    </svg>
  </div>
  <!-- Front wave -->
  <div class="wave-layer wave-front">
    <svg viewBox="0 0 1440 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#0B1F3A" d="M0,120 C180,80 360,155 540,120 C720,85 900,155 1080,120 C1260,85 1350,135 1440,120 L1440,180 L0,180 Z"/>
      <path fill="#0B1F3A" d="M1440,120 C1260,80 1080,155 900,120 C720,85 540,155 360,120 C180,85 90,135 0,120 L0,180 L1440,180 Z"/>
    </svg>
  </div>

  <!-- Ship -->
  <div class="ship-wrap">
    <!-- smoke puffs -->
    <div class="smoke" style="width:14px;height:14px;left:68px;--sd:3s;animation-delay:0s;"></div>
    <div class="smoke" style="width:10px;height:10px;left:75px;--sd:3s;animation-delay:1s;"></div>
    <div class="smoke" style="width:16px;height:16px;left:62px;--sd:3s;animation-delay:2s;"></div>

    <svg class="ship-svg" viewBox="0 0 280 120" xmlns="http://www.w3.org/2000/svg">
      <!-- Hull -->
      <path d="M20,75 L260,75 L245,100 L35,100 Z" fill="#1a3d6b" stroke="#2a5c9e" stroke-width="1.5"/>
      <!-- Hull highlight -->
      <path d="M30,78 L250,78" stroke="#2e6caa" stroke-width="1" opacity="0.5"/>
      <!-- Water line stripe -->
      <path d="M35,95 L245,95" stroke="#F5C842" stroke-width="2.5" opacity="0.7"/>

      <!-- Superstructure base -->
      <rect x="70" y="45" width="150" height="30" rx="3" fill="#1e4a80" stroke="#2a5c9e" stroke-width="1"/>
      <!-- Deck details -->
      <rect x="80" y="50" width="20" height="12" rx="2" fill="#2d6caa" opacity="0.8"/>
      <rect x="108" y="50" width="20" height="12" rx="2" fill="#2d6caa" opacity="0.8"/>
      <rect x="136" y="50" width="20" height="12" rx="2" fill="#2d6caa" opacity="0.8"/>
      <rect x="164" y="50" width="20" height="12" rx="2" fill="#2d6caa" opacity="0.8"/>
      <!-- Window reflections -->
      <rect x="82" y="52" width="6" height="4" rx="1" fill="#4FC3C3" opacity="0.6"/>
      <rect x="110" y="52" width="6" height="4" rx="1" fill="#4FC3C3" opacity="0.6"/>
      <rect x="138" y="52" width="6" height="4" rx="1" fill="#4FC3C3" opacity="0.6"/>
      <rect x="166" y="52" width="6" height="4" rx="1" fill="#4FC3C3" opacity="0.6"/>

      <!-- Bridge top -->
      <rect x="100" y="28" width="80" height="20" rx="3" fill="#245a9e" stroke="#3572be" stroke-width="1"/>
      <rect x="110" y="32" width="14" height="10" rx="1" fill="#4FC3C3" opacity="0.5"/>
      <rect x="128" y="32" width="14" height="10" rx="1" fill="#4FC3C3" opacity="0.5"/>
      <rect x="146" y="32" width="14" height="10" rx="1" fill="#4FC3C3" opacity="0.5"/>
      <rect x="164" y="32" width="10" height="10" rx="1" fill="#4FC3C3" opacity="0.5"/>

      <!-- Funnel / chimney -->
      <rect x="120" y="10" width="20" height="22" rx="4" fill="#1a3d6b" stroke="#2a5c9e" stroke-width="1.5"/>
      <!-- Funnel stripe -->
      <rect x="120" y="18" width="20" height="6" fill="#F5C842" opacity="0.8"/>

      <!-- Bow -->
      <path d="M260,75 L270,88 L245,100 Z" fill="#15345a"/>

      <!-- Railing lines -->
      <line x1="70" y1="45" x2="70" y2="75" stroke="#2a5c9e" stroke-width="1" opacity="0.5"/>
      <line x1="220" y1="45" x2="220" y2="75" stroke="#2a5c9e" stroke-width="1" opacity="0.5"/>
      <line x1="70" y1="45" x2="220" y2="45" stroke="#3572be" stroke-width="1" opacity="0.4"/>

      <!-- Flag -->
      <line x1="140" y1="2" x2="140" y2="12" stroke="#F5C842" stroke-width="1.5"/>
      <path d="M140,2 L156,5 L140,9 Z" fill="#F5C842"/>

      <!-- Anchor symbol on hull -->
      <text x="140" y="91" text-anchor="middle" font-size="11" fill="#F5C842" opacity="0.5" font-family="serif">⚓</text>

      <!-- Reflection in water -->
      <ellipse cx="140" cy="106" rx="90" ry="6" fill="#1a3d6b" opacity="0.3"/>
    </svg>
  </div>
</div>

<script>
  // ── STARS ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*75}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      animation-delay:${(Math.random()*5).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── COUNTDOWN ──
  const target = new Date('2026-10-10T10:00:00');
  const RANGE_DAYS = 365;
  const rangeMs = RANGE_DAYS * 24 * 60 * 60 * 1000;

  function pad(n) { return String(n).padStart(2,'0'); }

  function animateNumber(el, val) {
    if (el.textContent === val) return;
    el.classList.add('flip');
    setTimeout(() => { el.textContent = val; el.classList.remove('flip'); }, 150);
  }

  function tick() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('countdown-wrap').innerHTML =
        '<p class="arrived">🛳️ Bon Voyage! The voyage begins!</p>';
      return;
    }
    const totalSec = Math.floor(diff / 1000);
    animateNumber(document.getElementById('days'),    pad(Math.floor(totalSec / 86400)));
    animateNumber(document.getElementById('hours'),   pad(Math.floor((totalSec % 86400) / 3600)));
    animateNumber(document.getElementById('minutes'), pad(Math.floor((totalSec % 3600) / 60)));
    animateNumber(document.getElementById('seconds'), pad(totalSec % 60));

    const startRef  = new Date(target - rangeMs);
    const elapsed   = Math.max(0, now - startRef);
    const pct       = Math.min(100, (elapsed / (target - startRef)) * 100);
    document.getElementById('progress-fill').style.width = pct.toFixed(2) + '%';
    document.getElementById('progress-pct').textContent  = pct.toFixed(1) + '% of the way there';
  }

  tick();
  setInterval(tick, 1000);

  // ── GYROSCOPE / MOTION ──
  const shipWrap   = document.querySelector('.ship-wrap');
  const waveBack   = document.querySelector('.wave-back');
  const waveMid    = document.querySelector('.wave-mid');
  const waveFront  = document.querySelector('.wave-front');
  const motionBtn  = document.getElementById('motion-btn');
  const body       = document.body;

  // Smoothed sensor values
  let smoothGamma = 0; // left-right tilt  (-90 → +90)
  let smoothBeta  = 0; // front-back tilt  (-180 → +180)
  const SMOOTH = 0.08; // lower = smoother / more lag

  // Current JS-driven offsets (used when gyro is active)
  let shipX = 0, shipY = 0, shipRot = 0;
  let waveBackOff = 0, waveMidOff = 0, waveFrontOff = 0;
  let gyroActive = false;
  let rafId = null;

  function applyMotion(gamma, beta) {
    // gamma: tilt left/right. Clamp to ±40° for comfort.
    const g = Math.max(-40, Math.min(40, gamma));
    // beta:  tilt forward/back. Use a narrower range.
    const b = Math.max(-30, Math.min(30, beta - 45)); // -45 so "neutral" is normal hold angle

    // Smooth
    smoothGamma += (g - smoothGamma) * SMOOTH;
    smoothBeta  += (b - smoothBeta)  * SMOOTH;

    // Ship: sway left/right, bob up/down with tilt, rotate to feel like rocking
    shipX   = smoothGamma * 1.5;          // px horizontal drift
    shipY   = smoothBeta  * 0.6;          // px vertical drift
    shipRot = smoothGamma * 0.35;         // degrees rotation

    // Waves: shift speed offset based on tilt (parallax layers at different rates)
    waveBackOff  = smoothGamma * 0.8;
    waveMidOff   = smoothGamma * 1.4;
    waveFrontOff = smoothGamma * 2.0;

    // Apply to elements via transform (on top of existing CSS animations)
    shipWrap.style.transform =
      `translateX(calc(-50% + ${shipX}px)) translateY(${shipY}px) rotate(${shipRot}deg)`;

    // Wave layers: we offset their translateX by the tilt amount
    // The CSS animation already handles the scrolling; we inject an extra offset
    // by wrapping the wave containers in a parent nudge via margin-left trick
    waveBack.style.marginLeft  = `${waveBackOff}px`;
    waveMid.style.marginLeft   = `${waveMidOff}px`;
    waveFront.style.marginLeft = `${waveFrontOff}px`;

    rafId = requestAnimationFrame(() => {}); // keep loop alive via deviceorientation event
  }

  function onOrientation(e) {
    if (!gyroActive) return;
    applyMotion(e.gamma ?? 0, e.beta ?? 45);
  }

  function startGyro() {
    gyroActive = true;
    body.classList.add('gyro-active');
    motionBtn.style.display = 'none';
    window.addEventListener('deviceorientation', onOrientation, true);
  }

  function initMotion() {
    // iOS 13+ requires explicit permission
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      // Show button so user can tap to request permission (must be user gesture)
      motionBtn.style.display = 'flex';
      motionBtn.addEventListener('click', () => {
        DeviceOrientationEvent.requestPermission()
          .then(state => { if (state === 'granted') startGyro(); })
          .catch(console.warn);
      }, { once: true });
    } else if (window.DeviceOrientationEvent) {
      // Android / desktop — no permission needed; start automatically
      // But only if the device actually seems to have a gyroscope
      // (we'll listen and bail if we never get a real non-zero reading)
      let checkCount = 0;
      const testListener = (e) => {
        checkCount++;
        if (checkCount > 3 && (e.gamma !== null || e.beta !== null)) {
          window.removeEventListener('deviceorientation', testListener, true);
          startGyro();
        } else if (checkCount > 10) {
          // No real sensor data — give up silently
          window.removeEventListener('deviceorientation', testListener, true);
        }
      };
      window.addEventListener('deviceorientation', testListener, true);
    }
    // Desktop: no gyroscope; the CSS bob animation plays as normal
  }

  // Kick off after a short delay so the page paints first
  setTimeout(initMotion, 800);
</script>
</body>
</html>
